<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>NOT-visionOS MVP</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header class="topbar">
      <strong>NOT-visionOS MVP</strong>
      <div class="status-wrap">
        <span id="camera-status" class="status off">카메라 꺼짐</span>
        <span id="mode-status" class="status">모드: mouse</span>
      </div>
      <div class="topbar-actions">
        <button id="home-toggle">홈</button>
        <button id="quick-toggle">빠른 설정</button>
        <button id="control-toggle">제어 센터</button>
      </div>
    </header>

    <main id="workspace" aria-label="workspace">
      <section id="home-panel" class="panel hidden">
        <h2>홈</h2>
        <div class="home-actions">
          <button id="new-window">새 창 열기</button>
          <button id="reset-layout">최근 배치 복원</button>
          <button id="open-settings">설정 열기</button>
        </div>
      </section>

      <section id="quick-panel" class="panel hidden">
        <h2>빠른 설정</h2>
        <label><input id="camera-toggle" type="checkbox" checked /> 카메라 켜기</label>
        <button id="restart-tracking">손 추적 재시작</button>
        <button id="recalibrate">기준 자세 다시 잡기</button>
        <label>민감도 <input id="sensitivity" type="range" min="0.4" max="2.5" step="0.1" value="1.2" /></label>
        <label>커서 속도 <input id="cursor-speed" type="range" min="0.3" max="3" step="0.1" value="1" /></label>
        <label><input id="mirror-toggle" type="checkbox" checked /> 좌우 반전</label>
        <label><input id="mouse-gesture-toggle" type="checkbox" checked /> 마우스 제스처 테스트(Shift+좌클릭)</label>
        <small class="hint">Shift+좌클릭 또는 창 모서리 핸들을 좌클릭 유지하면 핀치(집기)처럼 동작해 클릭/드래그/리사이즈를 테스트할 수 있습니다.</small>
        <button id="fullscreen">전체화면</button>
      </section>

      <section id="control-center" class="panel control-center hidden">
        <h2>제어 센터</h2>
        <label>화면 밝기
          <input id="brightness-slider" type="range" min="20" max="100" step="1" value="100" />
        </label>
        <div class="control-row">
          <span>현재 시간</span>
          <strong id="current-time">--:--:--</strong>
        </div>
      </section>

      <video id="camera" autoplay playsinline muted></video>
      <canvas id="overlay"></canvas>

      <div class="window" data-window-id="main" style="left: 80px; top: 120px; width: 420px; height: 280px;">
        <div class="titlebar">메인 창</div>
        <div class="window-content scrollable">
          <p>핀치(엄지+검지)로 클릭/드래그/스크롤이 가능합니다.</p>
          <p>짧게 집기: 클릭, 길게 집기(0.7초): 롱프레스 메뉴.</p>
          <p>스크롤 영역 테스트:</p>
          <ul id="demo-list"></ul>
        </div>
        <div class="resize-handle"></div>
      </div>

      <div class="window" data-window-id="aux-1" style="left: 560px; top: 170px; width: 320px; height: 220px;">
        <div class="titlebar">보조 창 A</div>
        <div class="window-content">창을 집어서 이동해 보세요.</div>
        <div class="resize-handle"></div>
      </div>

      <div class="window" data-window-id="aux-2" style="left: 320px; top: 440px; width: 360px; height: 220px;">
        <div class="titlebar">보조 창 B</div>
        <div class="window-content">모서리를 집으면 크기 조절됩니다.</div>
        <div class="resize-handle"></div>
      </div>

      <button id="gesture-home-button" class="gesture-home-button" type="button" aria-label="홈">홈</button>
      <div id="virtual-cursor" aria-hidden="true"></div>
    </main>

    <script type="module" src="app.js"></script>
  </body>
</html>
